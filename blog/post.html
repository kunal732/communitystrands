<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Community Strands</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/swift.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #0d0d14; --text: #cdd6f4; --text-muted: #6c7086;
      --text-dim: #9399b2; --accent: #F05138; --border: #1e1e2e;
      --code-bg: #181825; --link: #89b4fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 15px; line-height: 1.65; }
    header { border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; gap: 1rem; background: rgba(17,17,25,0.92); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
    .logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; color: var(--text); font-weight: 700; font-size: 15px; }
    .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: white; font-weight: 800; }
    header nav { margin-left: auto; display: flex; gap: 1.25rem; }
    header nav a { color: var(--text-dim); text-decoration: none; font-size: 13px; }
    header nav a:hover { color: var(--text); }

    main { max-width: 720px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    .post-header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .post-header h1 { font-size: 2rem; font-weight: 800; line-height: 1.2; color: #fff; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
    .post-byline { font-size: 13px; color: var(--text-muted); display: flex; gap: 1rem; flex-wrap: wrap; }
    .post-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.75rem; }
    .post-tag { font-size: 11px; font-weight: 500; background: rgba(137,180,250,0.08); color: #89b4fa; border: 1px solid rgba(137,180,250,0.2); padding: 2px 8px; border-radius: 4px; }

    .post-body h1 { display: none; }
    .post-body h2 { font-size: 1.35rem; font-weight: 700; margin: 2.5rem 0 0.9rem; color: #e2e2f0; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .post-body h3 { font-size: 1.05rem; font-weight: 600; margin: 1.75rem 0 0.65rem; color: #e2e2f0; }
    .post-body p  { margin-bottom: 1rem; line-height: 1.7; }
    .post-body a  { color: var(--link); }
    .post-body a:hover { text-decoration: underline; }
    .post-body ul, .post-body ol { margin: 0.5rem 0 1rem 1.5rem; }
    .post-body li { margin-bottom: 0.4rem; line-height: 1.65; }
    .post-body strong { color: #e2e2f0; font-weight: 600; }
    .post-body pre { margin: 1.5rem 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .post-body pre code { font-size: 13px; display: block; padding: 1.25rem 1.5rem; overflow-x: auto; background: #1a1a2e; border: none; border-radius: 0; }
    .post-body code { font-family: "SF Mono", "JetBrains Mono", Consolas, monospace; font-size: 0.85em; background: var(--code-bg); padding: 0.15em 0.45em; border-radius: 4px; color: #cba6f7; border: 1px solid var(--border); }
    .post-body pre code { border: none; padding: 1.25rem 1.5rem; color: inherit; }
    .post-body hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .post-body blockquote { border-left: 3px solid var(--accent); padding: 0.5rem 1rem; margin: 1.25rem 0; background: rgba(240,81,56,0.05); border-radius: 0 6px 6px 0; }
    .post-body blockquote p { margin: 0; color: var(--text-dim); font-style: italic; }

    .back-link { display: inline-block; margin-top: 3rem; font-size: 13px; color: var(--link); text-decoration: none; font-weight: 500; border-top: 1px solid var(--border); padding-top: 1.5rem; width: 100%; }
    .error { color: #f38ba8; font-size: 14px; padding: 2rem 0; }
  </style>
  <script
    src="https://www.datadoghq-browser-agent.com/us1/v6/datadog-rum.js"
    type="text/javascript"
    crossorigin>
  </script>
  <script>
    window.DD_RUM && window.DD_RUM.init({
      clientToken: 'pubc261f160168ba8b6deeafb89573ba6c0',
      applicationId: 'fca7ce12-b9b8-46c5-9aeb-775968406461',
      site: 'datadoghq.com',
      service: 'communitystrands',
      env: 'prod',
      version: '0.0.1',
      sessionSampleRate: 100,
      sessionReplaySampleRate: 100,
      trackBfcacheViews: true,
      defaultPrivacyLevel: 'allow',
    });
  </script>
</head>
<body>
<header>
  <a class="logo" href="../">
    <div class="logo-icon">S</div>
    <span>Community Strands</span>
  </a>
  <nav>
    <a href="../">Home</a>
    <a href="index.html">Blog</a>
    <a href="../swift/">Swift SDK</a>
    <a href="https://github.com/kunal732/communitystrands" target="_blank">GitHub</a>
  </nav>
</header>

<main>
  <div id="content"><p style="color:var(--text-muted);font-size:14px">Loading...</p></div>
</main>

<script>
const REPO   = "kunal732/communitystrands";
const BRANCH = "master";
const RAW    = `https://raw.githubusercontent.com/${REPO}/${BRANCH}`;

async function load() {
  const slug = new URLSearchParams(window.location.search).get("slug");
  const el   = document.getElementById("content");
  if (!slug) { el.innerHTML = '<p class="error">No post specified.</p>'; return; }

  try {
    const [indexRes, mdRes] = await Promise.all([
      fetch(`${RAW}/blog/index.json`),
      fetch(`${RAW}/blog/posts/${slug}.md`)
    ]);
    if (!mdRes.ok) throw new Error(`Post not found (HTTP ${mdRes.status})`);
    const { posts } = await indexRes.json();
    const meta = posts.find(p => p.slug === slug) || {};
    const html = marked.parse(await mdRes.text());

    const date = meta.date ? new Date(meta.date).toLocaleDateString("en-US", { year:"numeric", month:"long", day:"numeric" }) : "";
    const tags = (meta.tags||[]).map(t => `<span class="post-tag">${t}</span>`).join("");

    el.innerHTML = `
      <div class="post-header">
        <h1>${meta.title || slug}</h1>
        <div class="post-byline">
          ${date ? `<span>${date}</span>` : ""}
          ${meta.author ? `<span>by ${meta.author}</span>` : ""}
        </div>
        ${tags ? `<div class="post-tags">${tags}</div>` : ""}
      </div>
      <div class="post-body">${html}</div>
      <a class="back-link" href="index.html">← All posts</a>`;

    if (meta.title) document.title = `${meta.title} | Community Strands`;
    document.querySelectorAll(".post-body pre code").forEach(el => hljs.highlightElement(el));
  } catch(e) {
    el.innerHTML = `<p class="error">Could not load post: ${e.message}</p>`;
  }
}
document.addEventListener("DOMContentLoaded", load);
</script>
</body>
</html>
